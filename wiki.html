<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wiki — IslesOfDawnMC</title>
    <meta name="description" content="Official IslesOfDawnMC wiki pages reviewed by management." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html" aria-label="IslesOfDawnMC home">
          <img class="brand-logo" src="assets/islesofdawnmc-logo.svg" alt="IslesOfDawnMC" />
        </a>
        <div class="nav-right">
          <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="announcements.html">Announcements</a>
            <a href="applications.html">Applications</a>
            <a href="appeals.html">Appeals</a>
            <a href="https://islesofdawnmc.tebex.io" target="_blank" rel="noopener noreferrer">Store</a>
          </nav>
          <div id="navAuth"></div>
        </div>
      </div>
    </header>

    <main class="staff-module-page">
      <section class="section">
        <div class="container">
          <div class="card staff-module-header">
            <p class="eyebrow">Knowledge Base</p>
            <h2>IslesOfDawnMC Wiki</h2>
            <p class="staff-module-subtitle">Only manager-approved pages are published here.</p>
          </div>

          <div class="card wiki-shell">
            <p class="copy-message" id="wikiPublicStatus" aria-live="polite"></p>
            <div class="wiki-layout wiki-layout-home">
              <aside class="card wiki-sidebar-card">
                <h3 class="wiki-block-title">Folders</h3>
                <div id="wikiSidebarGroups" class="hr-log-list"></div>
                <h3 class="wiki-block-title wiki-secondary-title">Pages</h3>
                <div id="wikiSidebarPages" class="hr-log-list"></div>
              </aside>
              <section class="card wiki-content-card">
                <h3 id="wikiSectionTitle" class="wiki-block-title">Section</h3>
                <div id="wikiPublicList" class="hr-log-list"></div>
              </section>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>© <span id="year"></span> IslesOfDawnMC. All rights reserved.</p>
      </div>
    </footer>

    <script src="auth.js"></script>
    <script src="supabase-data.js"></script>
    <script src="script.js"></script>
    <script>
      (async () => {
        const escHtml = (str) => String(str || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');

        const formatDate = (isoStr) => {
          if (!isoStr) return '—';
          const d = new Date(isoStr);
          return Number.isNaN(d.getTime()) ? '—' : d.toLocaleDateString();
        };

        const setStatus = (message, isError = false) => {
          const el = document.getElementById('wikiPublicStatus');
          if (!el) return;
          el.textContent = message;
          el.style.color = isError ? '#e75f5f' : '';
        };

        let wikiGroups = [];
        const publishedArticles = [];
        let activeGroupSlug = 'getting-started';

        const getGroupLabel = (slug) => {
          const found = wikiGroups.find((group) => group.slug === slug);
          return found?.label || slug || 'General';
        };

        const getArticlesByGroup = (groupSlug) => publishedArticles.filter((article) => article.groupSlug === groupSlug);

        const loadGroups = async () => {
          const result = await window.loadWikiGroups?.();
          wikiGroups = (result?.ok ? result.groups : null) || window.getWikiGroups?.() || [];
          if (!wikiGroups.length) {
            wikiGroups = [{ slug: 'getting-started', label: 'Getting Started' }];
          }
          if (!wikiGroups.some((group) => group.slug === activeGroupSlug)) {
            activeGroupSlug = wikiGroups[0].slug;
          }
        };

        const renderSidebarGroups = () => {
          const container = document.getElementById('wikiSidebarGroups');
          if (!container) return;

          container.innerHTML = '';
          wikiGroups.forEach((group) => {
            const count = getArticlesByGroup(group.slug).length;
            const row = document.createElement('div');
            row.className = 'hr-log-entry wiki-group-entry';
            row.innerHTML = `
              <div class="hr-log-entry-header">
                <span class="hr-status-badge ${group.slug === activeGroupSlug ? 'hr-status-active' : 'hr-status-onboarding'}">${escHtml(count)}</span>
                <span class="hr-log-meta">${escHtml(group.slug === activeGroupSlug ? 'Selected' : 'Open')}</span>
              </div>
              <p class="hr-log-body"><strong>${escHtml(group.label)}</strong></p>
            `;
            row.addEventListener('click', () => {
              activeGroupSlug = group.slug;
              renderSidebarGroups();
              renderSidebarPages();
              renderArticles();
            });
            container.appendChild(row);
          });
        };

        const renderSidebarPages = () => {
          const container = document.getElementById('wikiSidebarPages');
          if (!container) return;

          const articles = getArticlesByGroup(activeGroupSlug);
          container.innerHTML = '';
          if (!articles.length) {
            container.innerHTML = '<p class="announcement-empty">No pages in this folder yet.</p>';
            return;
          }

          articles.forEach((article) => {
            const row = document.createElement('div');
            row.className = 'hr-log-entry';
            const articleHref = `wiki-article.html?slug=${encodeURIComponent(article.slug || '')}`;
            row.innerHTML = `
              <p class="hr-log-body"><strong><a href="${escHtml(articleHref)}">${escHtml(article.title || 'Untitled')}</a></strong></p>
              <p class="hr-log-meta">${escHtml(formatDate(article.publishedAt || article.createdAt))}</p>
            `;
            container.appendChild(row);
          });
        };

        const renderArticles = (articles = []) => {
          const list = document.getElementById('wikiPublicList');
          if (!list) return;

          const heading = document.getElementById('wikiSectionTitle');
          if (heading) {
            heading.textContent = `${getGroupLabel(activeGroupSlug)} Pages`;
          }

          const scopedArticles = getArticlesByGroup(activeGroupSlug);
          list.innerHTML = '';

          if (!scopedArticles.length) {
            list.innerHTML = '<p class="announcement-empty">No approved pages in this folder yet.</p>';
            return;
          }

          scopedArticles.forEach((article) => {
            const item = document.createElement('article');
            item.className = 'hr-log-entry';
            const articleHref = `wiki-article.html?slug=${encodeURIComponent(article.slug || '')}`;
            item.innerHTML = `
              <div class="hr-log-entry-header">
                <span class="hr-status-badge hr-status-active">Published</span>
                <span class="hr-log-meta">${escHtml(formatDate(article.publishedAt || article.createdAt))}</span>
              </div>
              <p class="hr-log-body"><strong>${escHtml(article.title || 'Untitled')}</strong></p>
              ${article.excerpt ? `<p class="hr-log-body">${escHtml(article.excerpt)}</p>` : ''}
              <div class="staff-module-actions wiki-card-actions">
                <a class="btn btn-secondary" href="${escHtml(articleHref)}">Open Page</a>
              </div>
            `;
            list.appendChild(item);
          });
        };

        setStatus('Loading wiki pages...');
        await loadGroups();
        const result = await window.getPublishedWikiArticles?.();
        if (!result?.ok) {
          setStatus(result?.message || 'Could not load wiki pages.', true);
          renderArticles();
          return;
        }

        publishedArticles.push(...(result.articles || []));
        if (publishedArticles.length && !wikiGroups.some((group) => group.slug === activeGroupSlug)) {
          activeGroupSlug = publishedArticles[0].groupSlug || wikiGroups[0]?.slug || activeGroupSlug;
        }

        setStatus(`${publishedArticles.length} published page${publishedArticles.length === 1 ? '' : 's'} loaded.`);
        renderSidebarGroups();
        renderSidebarPages();
        renderArticles();
      })();
    </script>
  </body>
</html>
