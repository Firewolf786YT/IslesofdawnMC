<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wiki — IslesOfDawnMC</title>
    <meta name="description" content="Official IslesOfDawnMC wiki pages reviewed by management." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html" aria-label="IslesOfDawnMC home">
          <img class="brand-logo" src="assets/islesofdawnmc-logo.svg" alt="IslesOfDawnMC" />
        </a>
        <div class="nav-right">
          <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="announcements.html">Announcements</a>
            <a href="applications.html">Applications</a>
            <a href="appeals.html">Appeals</a>
            <a href="wiki.html">Wiki</a>
            <a href="teasers.html">Teasers</a>
            <a href="https://islesofdawnmc.tebex.io" target="_blank" rel="noopener noreferrer">Store</a>
          </nav>
          <div id="navAuth"></div>
        </div>
      </div>
    </header>

    <main class="staff-module-page">
      <section class="section">
        <div class="container">
          <div class="card staff-module-header">
            <p class="eyebrow">Knowledge Base</p>
            <h2>IslesOfDawnMC Wiki</h2>
            <p class="staff-module-subtitle">Only manager-approved pages are published here.</p>
          </div>

          <div class="card wiki-shell">
            <p class="copy-message" id="wikiPublicStatus" aria-live="polite"></p>
            <div class="wiki-layout wiki-layout-home">
              <section class="card wiki-content-card" style="width:100%;">
                <h3 class="wiki-block-title">Wiki Sections</h3>
                <div id="wikiCardGrid" class="wiki-card-grid">
                  <!-- Cards will be loaded dynamically by JS -->
                </div>
              </section>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>© <span id="year"></span> IslesOfDawnMC. All rights reserved.</p>
      </div>
    </footer>

    <script>
      // --- Dynamic Wiki Card Redesign (Supabase) ---
      (async () => {
        const grid = document.getElementById('wikiCardGrid');
        if (!grid) return;
        grid.innerHTML = '<p>Loading...</p>';
        const res = await window.loadWikiGroups?.();
        if (!res?.ok) {
          grid.innerHTML = '<p style="color:#e75f5f">Could not load wiki folders.</p>';
          return;
        }
        if (res.message && res.message.includes('default')) {
          grid.innerHTML = '<p style="color:#e7b95f">Showing default wiki sections. Supabase connection or table may be missing.</p>';
        } else {
          grid.innerHTML = '';
        }
        res.groups.forEach(folder => {
          const card = document.createElement('div');
          card.className = 'wiki-folder-card';
          card.innerHTML = `
            <div class="wiki-folder-icon">${folder.icon || '📁'}</div>
            <div class="wiki-folder-title">${folder.label}</div>
            <div class="wiki-folder-desc">${folder.description || ''}</div>
            <a class="wiki-folder-link" href="wiki.html?section=${encodeURIComponent(folder.slug)}">View Pages</a>
          `;
          grid.appendChild(card);
        });
      })();
    </script>
  </body>
</html>
