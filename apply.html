<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apply — IslesOfDawnMC</title>
    <meta
      name="description"
      content="Submit a staff application for an open IslesOfDawnMC role."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html" aria-label="IslesOfDawnMC home">
          <img class="brand-logo" src="assets/islesofdawnmc-logo.svg" alt="IslesOfDawnMC" />
        </a>
        <div class="nav-right">
          <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="announcements.html">Announcements</a>
            <a href="applications.html">Applications</a>
            <a href="appeals.html">Appeals</a>
            <a href="https://islesofdawnmc.tebex.io" target="_blank" rel="noopener noreferrer">Store</a>
          </nav>
          <div id="navAuth"></div>
        </div>
      </div>
    </header>

    <main>
      <div class="hero">
        <div class="container hero-content">
          <p class="eyebrow">Application</p>
          <h1 id="applyPageTitle">Staff Application</h1>
          <p class="hero-text">
            Complete all sections below. Each Section 2 response must be at least 3 sentences.
          </p>
        </div>
      </div>

      <div class="section">
        <div class="container app-apply-shell">
          <div id="appAccessNotice" class="card app-access-notice is-hidden"></div>

          <form id="staffApplicationForm" class="card app-form is-hidden" novalidate>
            <p class="app-form-status" id="applicationStatus" aria-live="polite"></p>

            <div class="app-role-chip" id="selectedRoleChip"></div>

            <fieldset class="app-form-section">
              <legend>1) Information</legend>
              <div class="app-form-grid">
                <input id="applicationRole" name="role" type="hidden" />
                <div id="applicationMinecraftUsernameField">
                  <label for="appMinecraftUsername">Minecraft Username</label>
                  <input id="appMinecraftUsername" name="minecraftUsername" type="text" placeholder="e.g. IslesPlayer" required />
                </div>
                <div>
                  <label for="appAge">Age</label>
                  <input id="appAge" name="age" type="number" min="13" max="99" placeholder="e.g. 18" required />
                </div>
                <div>
                  <label for="appDiscord">Discord Username</label>
                  <input id="appDiscord" name="discord" type="text" placeholder="e.g. user1234" required />
                </div>
                <div>
                  <label for="appEmail">Email</label>
                  <input id="appEmail" name="email" type="email" placeholder="you@example.com" required />
                </div>
              </div>
            </fieldset>

            <fieldset class="app-form-section">
              <legend>2) Staff Questions</legend>
              <div id="dynamicQuestionList" class="app-form-long-list"></div>
              <div id="dynamicExtraQuestionList" class="app-form-long-list"></div>
            </fieldset>

            <fieldset class="app-form-section">
              <legend>3) Acknowledgements</legend>
              <div class="app-ack-list">
                <div>
                  <label>Do you understand this is a voluntary role?</label>
                  <div class="app-radio-group" role="radiogroup" aria-label="Voluntary role acknowledgement">
                    <label class="app-radio-option">
                      <input type="radio" name="ackVolunteer" value="yes" required />
                      <span>Yes</span>
                    </label>
                    <label class="app-radio-option">
                      <input type="radio" name="ackVolunteer" value="no" required />
                      <span>No</span>
                    </label>
                  </div>
                </div>
                <div>
                  <label>Do you understand contacting staff repeatedly about your application may result in denial?</label>
                  <div class="app-radio-group" role="radiogroup" aria-label="No repeated staff contact acknowledgement">
                    <label class="app-radio-option">
                      <input type="radio" name="ackContacting" value="yes" required />
                      <span>Yes</span>
                    </label>
                    <label class="app-radio-option">
                      <input type="radio" name="ackContacting" value="no" required />
                      <span>No</span>
                    </label>
                  </div>
                </div>
                <div>
                  <label>Do you confirm that all information in this application is honest and accurate?</label>
                  <div class="app-radio-group" role="radiogroup" aria-label="Honesty acknowledgement">
                    <label class="app-radio-option">
                      <input type="radio" name="ackHonest" value="yes" required />
                      <span>Yes</span>
                    </label>
                    <label class="app-radio-option">
                      <input type="radio" name="ackHonest" value="no" required />
                      <span>No</span>
                    </label>
                  </div>
                </div>
              </div>
            </fieldset>

            <div class="app-form-actions">
              <button type="submit" class="btn btn-primary">Submit Application</button>
              <a class="btn btn-secondary" href="applications.html">Back to Applications</a>
            </div>
          </form>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>© <span id="year"></span> IslesOfDawnMC. All rights reserved.</p>
      </div>
    </footer>

    <script src="auth.js"></script>
    <script src="application-config.js"></script>
    <script src="supabase-data.js"></script>
    <script src="script.js"></script>
    <script>
      let appStatuses = {};
      const APP_DEFINITIONS = window.getApplicationDefinitions?.() || [];
      const DEFAULT_QUESTION_PROMPTS = [
        'Why do you want to become a staff member at IslesOfDawnMC?',
        'What relevant experience do you have for this role?',
        'How would you handle conflict between players or rule-breaking situations?',
        'What would you do to improve the IslesOfDawnMC community as staff?',
      ];

      const applicationForm = document.getElementById('staffApplicationForm');
      const applicationStatus = document.getElementById('applicationStatus');
      const applicationRole = document.getElementById('applicationRole');
      const appAccessNotice = document.getElementById('appAccessNotice');
      const selectedRoleChip = document.getElementById('selectedRoleChip');
      const applyPageTitle = document.getElementById('applyPageTitle');
      const applicationMinecraftUsernameField = document.getElementById('applicationMinecraftUsernameField');
      const appMinecraftUsername = document.getElementById('appMinecraftUsername');
      const dynamicQuestionList = document.getElementById('dynamicQuestionList');
      const dynamicExtraQuestionList = document.getElementById('dynamicExtraQuestionList');
      let accessRedirectTimer = null;
      let accessRedirectInterval = null;
      let renderedQuestionPrompts = [...DEFAULT_QUESTION_PROMPTS];
      let renderedExtraQuestions = [];

      const getRoleQuestionPrompts = (role) => {
        if (!role || !Array.isArray(role.questions) || role.questions.length !== 4) {
          return [];
        }

        return role.questions;
      };

      const renderQuestions = (role) => {
        const prompts = getRoleQuestionPrompts(role);
        renderedQuestionPrompts = [...prompts];
        if (!dynamicQuestionList) return;

        dynamicQuestionList.innerHTML = '';
        prompts.forEach((prompt, index) => {
          const wrapper = document.createElement('div');
          const questionId = `appQuestion${index + 1}`;

          const label = document.createElement('label');
          label.setAttribute('for', questionId);
          label.textContent = prompt;

          const textarea = document.createElement('textarea');
          textarea.id = questionId;
          textarea.name = `question_${index + 1}`;
          textarea.rows = 4;
          textarea.required = true;
          textarea.dataset.appQuestion = 'true';

          wrapper.append(label, textarea);
          dynamicQuestionList.appendChild(wrapper);
        });
      };

      const getRoleExtraQuestions = (role) => {
        if (!role || !Array.isArray(role.extraQuestions)) {
          return [];
        }

        return role.extraQuestions
          .filter((item) => item && typeof item === 'object')
          .map((item) => ({
            id: String(item.id || '').trim(),
            label: String(item.label || '').trim(),
            type: String(item.type || 'text').trim().toLowerCase(),
          }))
          .filter((item) => item.id && item.label && (item.type === 'yesno' || item.type === 'text'));
      };

      const renderExtraQuestions = (role) => {
        renderedExtraQuestions = getRoleExtraQuestions(role);
        if (!dynamicExtraQuestionList) return;

        dynamicExtraQuestionList.innerHTML = '';
        if (!renderedExtraQuestions.length) {
          return;
        }

        renderedExtraQuestions.forEach((question) => {
          const wrapper = document.createElement('div');

          const label = document.createElement('label');
          label.textContent = question.label;

          const fieldName = `extra_${question.id}`;
          if (question.type === 'yesno') {
            const radioGroup = document.createElement('div');
            radioGroup.className = 'app-radio-group';
            radioGroup.setAttribute('role', 'radiogroup');
            radioGroup.setAttribute('aria-label', question.label);

            const yesLabel = document.createElement('label');
            yesLabel.className = 'app-radio-option';
            yesLabel.innerHTML = `<input type="radio" name="${fieldName}" value="yes" required data-app-extra-id="${question.id}" /> <span>Yes</span>`;

            const noLabel = document.createElement('label');
            noLabel.className = 'app-radio-option';
            noLabel.innerHTML = `<input type="radio" name="${fieldName}" value="no" required data-app-extra-id="${question.id}" /> <span>No</span>`;

            radioGroup.append(yesLabel, noLabel);
            wrapper.append(label, radioGroup);
          } else {
            const input = document.createElement('input');
            input.type = 'text';
            input.name = fieldName;
            input.required = true;
            input.dataset.appExtraId = question.id;
            input.placeholder = question.label;
            wrapper.append(label, input);
          }

          dynamicExtraQuestionList.appendChild(wrapper);
        });
      };

      const isAppOpen = (id) => {
        return appStatuses[id] === true;
      };

      const setApplicationStatus = (message) => {
        if (!applicationStatus) return;
        applicationStatus.textContent = message;
        window.clearTimeout(setApplicationStatus._timer);
        setApplicationStatus._timer = window.setTimeout(() => {
          applicationStatus.textContent = '';
        }, 4200);
      };

      const redirectToSubmissionReceived = () => {
        const target = 'submission-received.html?type=application';
        try {
          window.location.assign(target);
        } catch {
          try {
            window.location.replace(target);
          } catch {
            try {
              window.location.href = target;
            } catch {
              setApplicationStatus('Application submitted. Please open submission-received.html?type=application manually.');
            }
          }
        }
      };

      const countSentences = (text) => {
        return text
          .split(/[.!?]+|\n+/)
          .map((sentence) => sentence.trim())
          .filter((sentence) => sentence.length >= 3).length;
      };

      const getCurrentRole = () => {
        const params = new URLSearchParams(window.location.search);
        const roleId = params.get('role') || '';
        return APP_DEFINITIONS.find((app) => app.id === roleId) || null;
      };

      const showAccessNotice = (message, options = {}) => {
        if (!appAccessNotice) return;
        const shouldRedirect = options.redirectAfterSeconds > 0;
        const redirectSeconds = options.redirectAfterSeconds || 0;

        window.clearTimeout(accessRedirectTimer);
        window.clearInterval(accessRedirectInterval);

        appAccessNotice.classList.remove('is-hidden');
        appAccessNotice.innerHTML = `
          <h3>Application Unavailable</h3>
          <p>${message}</p>
          ${shouldRedirect ? `<p id="appAccessRedirectNote" style="margin-top: 0.6rem;"></p>` : ''}
          <a class="btn btn-secondary" href="applications.html" style="display: inline-block; margin-top: 0.8rem; text-decoration: none;">Back to Applications</a>
        `;

        if (shouldRedirect) {
          let secondsLeft = redirectSeconds;
          const note = document.getElementById('appAccessRedirectNote');
          if (note) {
            note.textContent = `Redirecting automatically in ${secondsLeft} seconds...`;
          }

          accessRedirectInterval = window.setInterval(() => {
            secondsLeft -= 1;
            if (secondsLeft <= 0) {
              window.clearInterval(accessRedirectInterval);
              return;
            }

            if (note) {
              note.textContent = `Redirecting automatically in ${secondsLeft} seconds...`;
            }
          }, 1000);

          accessRedirectTimer = window.setTimeout(() => {
            window.location.replace('applications.html');
          }, redirectSeconds * 1000);
        }
      };

      const setFormAvailability = () => {
        const role = getCurrentRole();

        if (!role) {
          applicationForm?.classList.add('is-hidden');
          showAccessNotice('This role is invalid or missing. Please choose a role from the Applications page.');
          return null;
        }

        const questionPrompts = getRoleQuestionPrompts(role);
        if (questionPrompts.length !== 4) {
          applicationForm?.classList.add('is-hidden');
          showAccessNotice('No such application exists yet. This application type does not have questions configured.');
          return null;
        }

        if (applyPageTitle) {
          applyPageTitle.textContent = `${role.title} Application`;
        }

        if (!isAppOpen(role.id)) {
          applicationForm?.classList.add('is-hidden');
          showAccessNotice(
            `${role.title} is currently closed. You cannot access this application until it reopens.`,
            { redirectAfterSeconds: 5 }
          );
          return null;
        }

        window.clearTimeout(accessRedirectTimer);
        window.clearInterval(accessRedirectInterval);
        appAccessNotice?.classList.add('is-hidden');
        applicationForm?.classList.remove('is-hidden');

        if (applicationRole) {
          applicationRole.value = role.id;
        }

        if (selectedRoleChip) {
          selectedRoleChip.textContent = `${role.emoji} Applying for: ${role.title}`;
        }

        renderQuestions(role);
        renderExtraQuestions(role);

        if (applicationMinecraftUsernameField && appMinecraftUsername) {
          applicationMinecraftUsernameField.classList.remove('is-hidden');
          appMinecraftUsername.required = true;
        }

        return role;
      };

      const submitApplication = (role) => {
        if (!applicationForm || !role) return;

        applicationForm.addEventListener('submit', async (event) => {
          event.preventDefault();

          const ageValue = String(document.getElementById('appAge')?.value || '').trim();
          const discordValue = String(document.getElementById('appDiscord')?.value || '').trim();
          const emailValue = String(document.getElementById('appEmail')?.value || '').trim();
          const minecraftUsernameValue = String(appMinecraftUsername?.value || '').trim();

          if (!ageValue || !discordValue || !emailValue) {
            setApplicationStatus('Please complete all required fields in Section 1.');
            return;
          }

          const emailIsValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailValue);
          if (!emailIsValid) {
            setApplicationStatus('Please enter a valid email address.');
            return;
          }

          if (!isAppOpen(role.id)) {
            setApplicationStatus('This role just closed. You can no longer submit this application.');
            setFormAvailability();
            return;
          }

          if (!minecraftUsernameValue) {
            setApplicationStatus('Please provide your Minecraft Username.');
            return;
          }

          // Check if applicant is locked out from a previous denial
          const lockoutCheck = await window.checkApplicationLockout?.(minecraftUsernameValue);
          if (lockoutCheck?.locked) {
            const unlockDate = lockoutCheck.unlocksAt?.toLocaleDateString?.() || 'a future date';
            setApplicationStatus(`You are not eligible to re-apply at this time. Your previous application was denied. You may apply again after ${unlockDate}.`);
            return;
          }

          const formData = new FormData(applicationForm);

          const questionFields = Array.from(document.querySelectorAll('textarea[data-app-question="true"]'));
          const longAnswers = questionFields.map((input) => String(input.value || '').trim());

          const invalidAnswerIndex = longAnswers.findIndex((answer) => countSentences(answer) < 3);
          if (invalidAnswerIndex !== -1) {
            setApplicationStatus(`Question ${invalidAnswerIndex + 1} in Section 2 must be at least 3 sentences (or 3 clear lines).`);
            return;
          }

          const ackVolunteerValue = String(formData.get('ackVolunteer') || '');
          const ackContactingValue = String(formData.get('ackContacting') || '');
          const ackHonestValue = String(formData.get('ackHonest') || '');

          if (!ackVolunteerValue || !ackContactingValue || !ackHonestValue) {
            setApplicationStatus('Please answer all acknowledgement questions in Section 3.');
            return;
          }

          const extraResponses = [];
          for (const question of renderedExtraQuestions) {
            const fieldName = `extra_${question.id}`;
            const answerValue = String(formData.get(fieldName) || '').trim();
            if (!answerValue) {
              setApplicationStatus(`Please answer: ${question.label}`);
              return;
            }

            extraResponses.push({
              id: question.id,
              label: question.label,
              type: question.type,
              answer: answerValue,
            });
          }

          const newSubmission = {
            id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            status: 'pending',
            roleId: role.id,
            roleTitle: role.title,
            minecraftUsername: minecraftUsernameValue,
            age: String(formData.get('age') || '').trim(),
            discord: String(formData.get('discord') || '').trim(),
            email: String(formData.get('email') || '').trim(),
            whyJoin: longAnswers[0],
            experience: longAnswers[1],
            conflictHandling: longAnswers[2],
            communityImprovement: longAnswers[3],
            acknowledgements: {
              volunteer: ackVolunteerValue,
              contacting: ackContactingValue,
              honest: ackHonestValue,
              questionPrompts: [...renderedQuestionPrompts],
              extraResponses,
            },
            createdAt: new Date().toISOString(),
          };

          const inserted = await window.insertApplicationToSupabase?.(newSubmission);
          if (!inserted) {
            setApplicationStatus('Could not submit your application. Please verify Supabase setup and try again.');
            return;
          }

          redirectToSubmissionReceived();
        });
      };

      (async () => {
        const statuses = await window.syncApplicationStatusesFromSupabase?.();
        if (!statuses) {
          setApplicationStatus('Applications are currently unavailable while backend connection is being configured.');
          applicationForm?.classList.add('is-hidden');
          showAccessNotice('Applications are temporarily unavailable. Please try again after backend setup is completed.');
          return;
        }

        appStatuses = statuses;
        const activeRole = setFormAvailability();
        submitApplication(activeRole);
      })();
    </script>
  </body>
</html>
