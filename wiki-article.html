<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wiki Article | Isles of Dawn MC</title>
  <meta name="description" content="Read a published IslesOfDawnMC wiki article." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html" aria-label="IslesOfDawnMC home">
        <img class="brand-logo" src="assets/islesofdawnmc-logo.svg" alt="IslesOfDawnMC" />
      </a>
      <div class="nav-right">
        <nav class="nav-links">
          <a href="index.html">Home</a>
          <a href="announcements.html">Announcements</a>
          <a href="applications.html">Applications</a>
          <a href="appeals.html">Appeals</a>
          <a href="https://islesofdawnmc.tebex.io" target="_blank" rel="noopener noreferrer">Store</a>
        </nav>
        <div id="navAuth"></div>
      </div>
    </div>
  </header>

  <main class="staff-module-page">
    <section class="section">
      <div class="container">
        <div class="card staff-module-header">
          <p class="eyebrow">Knowledge Base</p>
          <h2 id="article-title">Wiki Article</h2>
          <p id="article-meta" class="staff-module-subtitle">Loading article...</p>
        </div>

        <div class="card" style="margin-top: 1rem;">
          <div style="display:grid;grid-template-columns:minmax(220px,280px) 1fr;gap:1rem;align-items:start;">
            <aside class="card" style="margin:0;">
              <h3 style="margin:0 0 0.45rem;">Wiki Sections</h3>
              <div id="wiki-sidebar" class="hr-log-list"></div>
              <div class="staff-module-actions" style="margin-top:0.85rem;">
                <a class="btn btn-secondary" href="wiki.html">Back to Wiki Home</a>
              </div>
            </aside>

            <section class="card" style="margin:0;">
              <article id="article-card" style="display:none;">
                <div class="hr-log-entry-header" style="margin-bottom:0.75rem;">
                  <span class="hr-status-badge hr-status-active">Published</span>
                  <span id="article-date" class="hr-log-meta"></span>
                </div>
                <div id="article-content" class="wiki-rendered-content"></div>
              </article>

              <article id="article-error" style="display:none;">
                <h3 style="margin-top:0;">Article Not Found</h3>
                <p style="color:var(--muted); margin:0.5rem 0 1rem;">The article you requested could not be loaded, or it is no longer published.</p>
                <a class="btn btn-secondary" href="wiki.html">Go to Wiki Home</a>
              </article>
            </section>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year"></span> IslesOfDawnMC. All rights reserved.</p>
    </div>
  </footer>

  <script src="auth.js"></script>
  <script src="supabase-data.js"></script>
  <script src="script.js"></script>
  <script>
    (function () {
      const sidebarEl = document.getElementById('wiki-sidebar');
      const articleCardEl = document.getElementById('article-card');
      const articleErrorEl = document.getElementById('article-error');
      const articleTitleEl = document.getElementById('article-title');
      const articleMetaEl = document.getElementById('article-meta');
      const articleDateEl = document.getElementById('article-date');
      const articleContentEl = document.getElementById('article-content');

      function escHtml(value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatDate(value) {
        if (!value) return 'Unknown';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return 'Unknown';
        return date.toLocaleString();
      }

      function parseQuerySlug() {
        const params = new URLSearchParams(window.location.search || '');
        const slug = (params.get('slug') || '').trim();
        return slug;
      }

      function buildSidebar(groups, articles, activeSlug) {
        if (!sidebarEl) return;
        sidebarEl.innerHTML = '';

        if (!Array.isArray(groups) || !groups.length) {
          sidebarEl.innerHTML = '<p style="color:var(--muted-text); margin:0;">No wiki sections yet.</p>';
          return;
        }

        const grouped = new Map();
        (Array.isArray(articles) ? articles : []).forEach((article) => {
          const key = (article.groupSlug || article.group_slug || 'guides').trim() || 'guides';
          if (!grouped.has(key)) grouped.set(key, []);
          grouped.get(key).push(article);
        });

        groups.forEach((group) => {
          const slug = String(group.slug || '').trim();
          const title = group.label || group.title || slug || 'Section';
          const wrapper = document.createElement('div');
          wrapper.className = 'hr-log-entry';

          const sectionArticles = grouped.get(slug) || [];
          const entriesHtml = sectionArticles.length
            ? sectionArticles.map((article) => {
                const articleSlug = String(article.slug || '').trim();
                const href = `wiki-article.html?slug=${encodeURIComponent(articleSlug)}`;
                const activeStyle = articleSlug === activeSlug
                  ? ' style="font-weight:700; text-decoration:underline;"'
                  : '';
                return `<li><a href="${escHtml(href)}"${activeStyle}>${escHtml(article.title || 'Untitled')}</a></li>`;
              }).join('')
            : '<li style="color:var(--muted-text);">No published pages</li>';

          wrapper.innerHTML = `
            <p class="hr-log-body" style="margin-bottom:0.35rem;"><strong>${escHtml(title)}</strong></p>
            <ul style="margin:0; padding-left:1.1rem; display:flex; flex-direction:column; gap:0.2rem;">${entriesHtml}</ul>
          `;

          sidebarEl.appendChild(wrapper);
        });
      }

      async function loadArticlePage() {
        const slug = parseQuerySlug();
        if (!slug) {
          articleMetaEl.textContent = 'Missing article link.';
          articleErrorEl.style.display = 'block';
          return;
        }

        const [groupsRes, allRes, articleRes] = await Promise.all([
          window.getWikiGroups?.(),
          window.getPublishedWikiArticles?.(),
          window.getPublishedWikiArticleBySlug?.(slug)
        ]);

        const groups = groupsRes?.ok ? (groupsRes.groups || []) : [];
        const allArticles = allRes?.ok ? (allRes.articles || []) : [];
        buildSidebar(groups, allArticles, slug);

        if (!articleRes?.ok || !articleRes.article) {
          articleMetaEl.textContent = 'This article is unavailable.';
          articleErrorEl.style.display = 'block';
          return;
        }

        const article = articleRes.article;
        articleTitleEl.textContent = article.title || 'Untitled';
        articleMetaEl.textContent = article.excerpt || 'Published wiki article';
        articleDateEl.textContent = formatDate(article.publishedAt || article.createdAt);
        articleContentEl.innerHTML = window.renderWikiContentToHtml?.(article.content || '') || escHtml(article.content || '');
        articleCardEl.style.display = 'block';
      }

      loadArticlePage().catch((error) => {
        console.error('Failed to load wiki article page:', error);
        if (articleMetaEl) articleMetaEl.textContent = 'Could not load this article right now.';
        if (articleErrorEl) articleErrorEl.style.display = 'block';
      });
    })();
  </script>
</body>
</html>
